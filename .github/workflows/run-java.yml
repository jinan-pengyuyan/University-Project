name: Run Java Code

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'   # 如果需要其他版本可改为 '8', '11', '21' 等

      - name: Compile Java code
        run: javac java_01.java

      - name: Run Java code
        run: java Main
